<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>S-A-W</title>
  <style>
    body {
      background-color: lightcyan;
    }
    .container {
      height: 35vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .inputo {
      position: absolute;
      border: solid 2px black;
      bottom: 0px;
      width: 100%;
      height: 100px;
    }
    .spe {
      position: absolute;
      background-color: cyan;
      margin: 50px;
      right: -50px;
      bottom: 60px;
      padding: 0 50px 0 50px;
      border-radius: 5px;
    }
    .ilink {
      display: flex;
      justify-content: space-between;
      position: absolute;
      bottom: 200px;
      height: 40px;
      width: 98%;
      background-color: lightcyan;
      border: solid 0px black;
    }
    #output {
      position: absolute;
      bottom: 3px;
      z-index: 0;
      color: lightcyan;
      background-color: lightcyan;
    }
    .air {
      position: absolute;
      background-color: light-cyan;
      border: solid 2px black;
      bottom: 3px;
      right: 1px;
      height: 200px;
      width: 99%;
      z-index: 1;
    }
    .inputtextt {
      height: 35vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .inputtext {
      border-radius: 50px;
      color: white;
      background-color: black;
      width: 400px;
      height: 35px;
    }
    #submit-button {
      background: linear-gradient(to right, #2193B0, #6DD5ED);
      color: black;
      position: absolute;
      right: 27px;
      border-radius: 100px;
      height: 30px;
      width: 70px;
    }
    #inputBox {
      position: absolute;
      bottom: 241px;
    }
    #speak-button {
      background: lightcyan;
      color: lightcyan;
      position: absolute;
      bottom: 350px;
      right: 27px;
      border-radius: 100px;
      height: 30px;
      width: 100px;
      border: solid 1px lightcyan;
    }
  </style>
</head>
<body>
  <header>
    <pre><br><br></pre>
  </header>
  <main>
    <div class="container">
      <img src="https://i.ibb.co/DVSZQdH/Smart-Select-20250109-141454-Chrome.png" placeholder="S-A-W" height="300px">
    </div>
    <div class="ilink">
      <a href="http://google.com"><img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" placeholder="Google" height="25px"></a>
      <a href="http://youtube.com"><img src="https://upload.wikimedia.org/wikipedia/commons/4/42/YouTube_icon_%282013-2017%29.png" placeholder="Youtube" height="30px" width="40px"></a>
      <a href="http://facebook.com"><img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" placeholder="Facebook" height="30px" width="30px"></a>
      <a href="http://tiktok.com"><img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg" placeholder="Tik-Tok" height="25px"></a>
    </div>
    <div id="aiResponseBox" class="air"></div>
    <div id="input-section" class="inputtextt">
      <input type="text" id="input-field" class="inputtext" placeholder=" Ask Anything...">
      <button id="submit-button">Submit</button>
    </div>
    <!-- Added speak response button -->
    <button id="speak-button">Speak Response</button>
  </main>
  <footer>
    <div id="output">L.S :</div><br />
    <div id="inputBox"><strong>Us.I:</strong></div>
    <div id="r"></div>
  </footer>
  <script>
    const apiKey = 'YOUR_API_KEY';
    const messages = [
      {
        role: "assistant",
        content: "Hi, How can I help you today?"
      }
    ];
    let lastAIResponse = messages[0].content;

    const inputField = document.getElementById("input-field");
    const submitButton = document.getElementById("submit-button");
    const speakButton = document.getElementById("speak-button");
    const aiResponseBox = document.getElementById("aiResponseBox");
    const outputDiv = document.getElementById("output");

    aiResponseBox.textContent = `AI: ${messages[0].content}`;
    appendLog("AI: ", messages[0].content);

    function appendLog(prefix, text) {
      outputDiv.textContent += `${prefix}${text}\n`;
    }

    async function askCohere(messageList) {
      try {
        const response = await fetch("https://api.cohere.ai/v2/chat", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${apiKey}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "command-a-plus-05-2026",
            messages: messageList,
            thinking: { type: "enabled" }
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          return `Error: ${response.status} - ${errorText}`;
        }

        const data = await response.json();
        const content = data?.message?.content || [];
        const textBlock = content[1] || content[0];
        return textBlock?.text?.trim() || "";
      } catch (error) {
        return "Sorry, I couldn't process your request. Please try again.";
      }
    }

    function displayResponse(response) {
      aiResponseBox.textContent = `AI: ${response}`;
      appendLog("AI: ", response);
      lastAIResponse = response;
      speakButton.click();
    }

    async function handleUserMessage(userCommand) {
      if (!userCommand) {
        return;
      }

      appendLog("User: ", userCommand);
      messages.push({ role: "user", content: userCommand });

      const aiResponse = await askCohere(messages);
      messages.push({ role: "assistant", content: aiResponse });

      displayResponse(aiResponse);
      inputField.value = "";
      document.getElementById("inputBox").innerHTML = "<strong>Us.I:</strong>";
    }

    submitButton.addEventListener("click", async () => {
      await handleUserMessage(inputField.value.trim());
    });

    inputField.addEventListener("keydown", async (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        await handleUserMessage(inputField.value.trim());
      }
    });

    speakButton.addEventListener("click", function() {
      if (lastAIResponse) {
        const utterance = new SpeechSynthesisUtterance(lastAIResponse);
        window.speechSynthesis.speak(utterance);
      }
    });

    const SpeechRecognitionClass = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognitionClass) {
      const recognition = new SpeechRecognitionClass();
      recognition.continuous = true;
      recognition.lang = "en-US";

      let userCommand = "";

      recognition.onresult = function(event) {
        let transcript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript.trim() + " ";
        }

        if (transcript.toLowerCase().includes("over")) {
          userCommand = userCommand.trim();
          handleUserMessage(userCommand);
          userCommand = "";
        } else {
          userCommand += transcript;
          document.getElementById("inputBox").textContent = `User Input: ${userCommand}`;
        }
      };

      recognition.onerror = function(event) {
        console.error("Speech recognition error:", event.error);
      };

      recognition.onend = function() {
        recognition.start();
      };

      recognition.start();
    }
  </script>
</body>
</html>
